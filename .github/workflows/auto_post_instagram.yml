name: Auto-post to Instagram

# Instagram's Content Publishing API has no native scheduled_publish_time.
# GitHub's own `schedule:` trigger was tried first but confirmed unreliable
# for 7x/day -- it doesn't just delay, it silently DROPS a chunk of triggers
# under high frequency (verified: ~9.5hr gap where a slot never fired at
# all). So this is now triggered externally via cron-job.org calling the
# GitHub API's workflow_dispatch endpoint, which doesn't have that drop
# behavior -- it's treated like a manual/API run, not a best-effort cron tick.
on:
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate and post to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 auto_post_instagram.py

      - name: Commit updated Instagram dedupe log
        run: |
          git add content_pipeline/used_facts_instagram.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Instagram dedupe log [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) -- retrying..."
            sleep $((RANDOM % 10 + 5))
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts."
          exit 1
