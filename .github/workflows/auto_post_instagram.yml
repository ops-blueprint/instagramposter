name: Auto-post to Instagram
# Instagram's Content Publishing API has no native scheduled_publish_time.
# Schedule times are IST (UTC+5:30) expressed in UTC, since GitHub cron is UTC.
# NOTE: GitHub's `schedule:` trigger previously dropped slots at 7x/day. At
# 5x/day the risk is lower but not zero -- cron-job.org -> workflow_dispatch
# remains the reliable path and is kept enabled below.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 0 * * *"    # 06:00 IST
    - cron: "30 3 * * *"    # 09:00 IST
    - cron: "30 6 * * *"    # 12:00 IST
    - cron: "30 9 * * *"    # 15:00 IST
    - cron: "30 12 * * *"   # 18:00 IST
jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Generate and post to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 auto_post_instagram.py
      - name: Commit updated Instagram dedupe log
        run: |
          git add content_pipeline/used_facts_instagram.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Instagram dedupe log [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) -- retrying..."
            sleep $((RANDOM % 10 + 5))
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts."
          exit 1
